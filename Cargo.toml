schema-engine={git="https://github.com/LiGoldragon/schema-engine.git",rev="8224699a6c76a37af9b506af22b79fd5e91decd2"}
sema-storage={git="https://github.com/LiGoldragon/sema-storage.git",rev="3b71a90e6d841dfd57e5d6c7cee235d1f7cd27c8"}
signal-frame={git="https://github.com/LiGoldragon/signal-frame.git",rev="f46872e7e8edae5264c892443d415a273b231234",default-features=false}
