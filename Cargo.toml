[package]
name="language-engine-witness"
version="0.1.0"
edition="2024"
rust-version="1.89"
license="MIT OR Apache-2.0"
repository="https://github.com/LiGoldragon/language-engine-witness"
description="Process-level acceptance witness for the minimal language engine"
[dependencies]
logos-engine={git="https://github.com/LiGoldragon/logos-engine.git",rev="f30f158dc31e214062a0a24c7dd4b3e5ff509e1a"}
name-table={git="https://github.com/LiGoldragon/name-table.git",rev="c3237f77c087e6feab49d6cf34971cebc14a11e6"}
nomos-engine={git="https://github.com/LiGoldragon/nomos-engine.git",rev="ff1800b99c0af2e5b2d1e72a79657e0d5d595fd4"}
schema-engine={git="https://github.com/LiGoldragon/schema-engine.git",rev="fee414ca4dd179eeedea4de7a7d05411e7e66721"}
sema-storage={git="https://github.com/LiGoldragon/sema-storage.git",rev="d54dacdd1ad70cd312ea1f3ceb15efc2cec98930"}
signal-frame={git="https://github.com/LiGoldragon/signal-frame.git",rev="f46872e7e8edae5264c892443d415a273b231234",default-features=false}
signal-logos={git="https://github.com/LiGoldragon/signal-logos.git",rev="9c119916aaa77f98b0968102419a500f62ba6cce"}
signal-nomos={git="https://github.com/LiGoldragon/signal-nomos.git",rev="afdf62f371f5b52eab5122dc0de6d1bf40ba753c"}
signal-schema={git="https://github.com/LiGoldragon/signal-schema.git",rev="1b090702e5c2f792a64e2cf1c51a5698505d9bad"}
signal-sema-storage={git="https://github.com/LiGoldragon/signal-sema-storage.git",rev="bd6cd6c4f2f020ad04427fc8ca86ca22d9cf4e6c"}
rkyv={version="0.8",features=["bytecheck"]}
tokio={version="1",features=["macros","rt-multi-thread","net","io-util","time"]}
[dev-dependencies]
tempfile="3"
[lints.rust]
unsafe_code="forbid"
