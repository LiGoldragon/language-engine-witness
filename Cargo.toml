nomos-engine={git="https://github.com/LiGoldragon/nomos-engine.git",rev="49c6d9d25fcc940a4a583660466279218ffc4d18"}
schema-engine={git="https://github.com/LiGoldragon/schema-engine.git",rev="adccf9d29c982a35f8e8ea44146a1da96ed88254"}
sema-storage={git="https://github.com/LiGoldragon/sema-storage.git",rev="dfe78a25ae263e823cef288d21e06c2b0be76173"}
signal-frame={git="https://github.com/LiGoldragon/signal-frame.git",rev="f46872e7e8edae5264c892443d415a273b231234",default-features=false}
signal-logos={git="https://github.com/LiGoldragon/signal-logos.git",rev="95ab7ac0029b64c71b1730dba09d734f971af61a"}
signal-nomos={git="https://github.com/LiGoldragon/signal-nomos.git",rev="49f6021739a5343acbb374ef5765f13f2692fe84"}
signal-schema={git="https://github.com/LiGoldragon/signal-schema.git",rev="6e426b61cf97f6da977dd8a8cd690bf1914f850b"}
