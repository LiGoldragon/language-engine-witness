rkyv={version="0.8",features=["bytecheck"]}
tokio={version="1",features=["macros","rt-multi-thread","net","io-util","time"]}
[dev-dependencies]
tempfile="3"
[patch."https://github.com/LiGoldragon/kameo.git?branch=main"]
kameo={git="https://github.com/LiGoldragon/kameo.git",rev="f491b45d7dcb55e5837eddde3d5d7ca8ceaa9f01"}
[patch."https://github.com/LiGoldragon/signal-frame.git?branch=main"]
signal-frame={git="https://github.com/LiGoldragon/signal-frame.git",rev="f46872e7e8edae5264c892443d415a273b231234"}
[lints.rust]
unsafe_code="forbid"
