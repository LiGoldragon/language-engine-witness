[package]
name="language-engine-witness"
version="0.1.0"
edition="2024"
rust-version="1.89"
license="MIT OR Apache-2.0"
repository="https://github.com/LiGoldragon/language-engine-witness"
description="Process-level acceptance witness for the minimal language engine"
[dependencies]
logos-engine={git="https://github.com/LiGoldragon/logos-engine.git",rev="d67d2e88a812e8045331d8237c714bea7eb68aad"}
name-table={git="https://github.com/LiGoldragon/name-table.git",rev="c3237f77c087e6feab49d6cf34971cebc14a11e6"}
nomos-engine={git="https://github.com/LiGoldragon/nomos-engine.git",rev="f129677fcc05cbce48f0c32eb2ecd0915c9940a4"}
schema-engine={git="https://github.com/LiGoldragon/schema-engine.git",rev="a451f631cc03"}
sema-storage={git="https://github.com/LiGoldragon/sema-storage.git",rev="a088dc14bcc6b94ab1b0c3e41e2250ddf1e7b06f"}
signal-frame={git="https://github.com/LiGoldragon/signal-frame.git",rev="f46872e7e8edae5264c892443d415a273b231234",default-features=false}
signal-logos={git="https://github.com/LiGoldragon/signal-logos.git",rev="43269306602e823395bdeffe2a653fc41f1f5eb2"}
signal-nomos={git="https://github.com/LiGoldragon/signal-nomos.git",rev="243ac371683c0045a7de56e235533bc4fc0b84eb"}
signal-schema={git="https://github.com/LiGoldragon/signal-schema.git",rev="a7d62024aad57a761a3e60b397eb475c4858b4f5"}
